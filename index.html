 





<!DOCTYPE html>
<html lang='en'>
<head>
  <meta charset='UTF-8'>
  <meta name='viewport' content='width=device-width, initial-scale=1.0'>
  <title>Modern Clothing Store</title>
  <style>
    body {font-family: 'Helvetica Neue', Arial, sans-serif; margin:0; padding:0; background:#333; color:#fff;}
    header {background:#000; color:#fff; padding:1rem 2rem; display:flex; justify-content:space-between; align-items:center;}
    nav a {color:#fff; margin:0 1rem; text-decoration:none;}
    .hero {background:url('') center/cover no-repeat; height:60vh; display:flex; align-items:center; justify-content:center; color:#fff; text-shadow:0 0 10px rgba(0,0,0,0.5;}
    .hero h1 {font-size:3rem; margin:0;}
    .products {padding:2rem; display:grid; grid-template-columns:repeat(auto-fit, minmax(250px, 1fr)); gap:1.5rem; max-width:1200px; margin:auto;}
    .product {background:#222; border:1px solid #333; border-radius:8px; overflow:hidden; box-shadow:0 2px 5px rgba(0,0,0,0.1;}
    .product img {width:100%; height:200px; object-fit:cover;}
    .product-info {padding:1rem; text-align:center;}
    .product-info h3 {margin:0.5rem 0 0.3rem;}
    .product-info p {margin:0; color:#ccc;}
    footer {background:#000; color:#ccc; text-align:center; padding:1rem; margin-top:2rem;}

    /* Responsive adjustments */
    @media (max-width: 768px) {
      .hero h1 { font-size: 2rem; }
      nav { flex-direction: column; }
      nav a { margin: 0.5rem 0; }
      .products { grid-template-columns: 1fr; }
      .product-info { padding: 0.8rem; }
      .menu-icon { display: block; }
      nav { display: none; }
    }
  </style>
</head>
<body>
  <header>
    <div class='logo'><strong>StyleHub</strong></div>
    <div class='menu-icon'>&#9776;</div>
    <nav>
      <a href='#'>Home</a>
      <a href='#'>Shop</a>
      <a href='#'>About</a>
      <a href='#'>Contact</a>
    </nav>
  </header>
  <section class='hero'>
    <h1>Fresh Fashion, Fresh You</h1>
  </section>
  <section class='products'>
    <div class='product'>
      <img src='' alt='T-Shirt'>
      <div class='product-info'>
        <h3>Classic White T‑Shirt</h3>
        <p>$19.99</p>
      </div>
    </div>
    <div class='product'>
      <img src='' alt='Jeans'>
      <div class='product-info'>
        <h3>Slim Fit Jeans</h3>
        <p>$49.99</p>
      </div>
    </div>
    <div class='product'>
      <img src='' alt='Jacket'>
      <div class='product-info'>
        <h3>Leather Jacket</h3>
        <p>$149.99</p>
      </div>
    </div>
  </section>
  <footer>&copy; 2021 StyleHub. All rights reserved.</footer>
  <script>
    const currentYear = new Date().getFullYear();
    document.querySelector('footer').innerHTML = `&copy; ${currentYear} StyleHub. All rights reserved.`;
  </script>
</body>
</html>
